<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ВУЗ-Аналитика | Рекомендации</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">ВУЗ<br>АНАЛИТИКА</div>
      <nav class="nav">
        <a href="index.html">Главная</a>
        <a href="recommendations.html" class="active">Рекомендации</a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSf0kPORyCCDupVuDzdmvuKuWddl6kbFOCgZJ50XyfE42tGaxQ/viewform?usp=dialog" target="_blank" class="form-link">Опрос</a>
      </nav>
      <div class="sidebar-footer"></div>
    </aside>

    <main class="main">
      <div class="header">
        <div>
          <h1>РЕКОМЕНДАЦИИ <span>по ID</span></h1>
          <p>Введите ID пользователя для получения рекомендованных вузов</p>
        </div>
      </div>

      <div class="filter-section">
        <div style="display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap;">
          <input type="number" id="userIdInput" placeholder="Введите ваш ID (например: 1)"
            style="flex:1; background:#1a1d27; border:1px solid #2a2f3f; padding:14px 18px; border-radius:16px; color:white; font-size:16px;">
          <button id="searchBtn" class="btn" style="width: auto; padding: 14px 32px; margin-top: 0;">Найти</button>
        </div>
        <div id="errorMessage" style="margin-top: 12px; color: #ff4d4d; display: none;"></div>
      </div>

      <div class="stats-block" style="margin-top: 24px;">
        <h3>Быстрый выбор (по ID)</h3>
        <div id="userList" style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 16px;"></div>
      </div>

      <div id="resultsSection" style="margin-top: 32px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h3 style="margin: 0;">Рекомендованные вузы</h3>
          <button id="shareResultsBtn" class="share-results-btn" style="display: none;">
            🔗 Поделиться
          </button>
        </div>
        <div id="recommendationsGrid" class="cards" style="margin-top: 20px;">
          <div style="color:#5a6077; text-align:center; padding:60px;">Введите ID для поиска</div>
        </div>
      </div>

      <div id="userInfo"
        style="margin-top: 24px; padding: 16px; background-color: #F5F0E8; border-radius: 16px; display: none;">
        <!-- сюда инфу о пользователе -->
      </div>

      <div class="footer">© 2026 ВУЗ-АНАЛИТИИКА • рекомендации основаны на результатах опроса</div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="static/js/mock-recommendations.js"></script>
  <script src="static/js/university-links.js"></script>
  <script src="static/js/api.js"></script>
  <script src="static/js/recommendations.js"></script>
</body>

</html>
